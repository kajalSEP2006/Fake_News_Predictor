<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Fake News Detection</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>📰 Fake News Detection</h1>

    <p class="subtitle">
        Paste any news article below and check whether it is
        <strong>Real</strong> or <strong>Fake</strong>.
    </p>

    <form method="POST">

        <textarea
            name="news"
            placeholder="Paste News Here..."
            required>{{ news }}</textarea>

        <button type="submit">
            Predict
        </button>

    </form>

    {% if prediction %}

    <div class="result">

        <h2>{{ prediction }}</h2>

    </div>

    {% endif %}

</div>

</body>
</html>
